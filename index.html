<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест: Какая модель продвижения вам подходит?</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .quiz-container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 15px;
            line-height: 1.3;
            text-align: center;
        }

        p.subtitle {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 30px;
            font-size: 16px;
            line-height: 1.5;
        }

        .progress-bar {
            background-color: #334155;
            height: 6px;
            border-radius: 3px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress {
            background-color: var(--accent-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: #334155;
            color: var(--text-color);
            border: 2px solid transparent;
            padding: 16px;
            border-radius: 10px;
            cursor: pointer;
            text-align: left;
            font-size: 15px;
            line-height: 1.4;
            transition: all 0.2s ease;
        }

        .option-btn:hover {
            background-color: #475569;
            border-color: var(--accent-color);
        }

        .btn-main {
            display: block;
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            text-align: center;
        }

        .btn-main:hover {
            background-color: var(--accent-hover);
        }

        /* Стили для результатов */
        .result-model {
            display: inline-block;
            background-color: rgba(99, 102, 241, 0.2);
            color: #a5b4fc;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .result-text h3 {
            margin: 20px 0 10px 0;
            font-size: 16px;
            color: #a5b4fc;
        }

        .result-text ul {
            padding-left: 20px;
            margin-bottom: 15px;
        }

        .result-text li {
            margin-bottom: 8px;
            font-size: 15px;
            color: #e2e8f0;
            line-height: 1.4;
        }
        
        .result-text p {
            line-height: 1.5;
            font-size: 15px;
            color: #e2e8f0;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <!-- СТАРТОВЫЙ ЭКРАН -->
    <div id="start-screen" class="screen active">
        <h1>Какая модель продвижения в инфобизнесе подходит именно вам?</h1>
        <p class="subtitle">Пройдите короткий тест из 5 вопросов, чтобы узнать, стоит ли вам строить автоворонки, запускать клуб или продавать через контент.</p>
        <button class="btn-main" onclick="startQuiz()">Начать тест</button>
    </div>

    <!-- ЭКРАН ВОПРОСОВ -->
    <div id="question-screen" class="screen">
        <div class="progress-bar"><div id="progress" class="progress"></div></div>
        <div id="question-title" class="question-title">Текст вопроса</div>
        <div id="options" class="options-list">
            <!-- Кнопки ответов будут создаваться динамически -->
        </div>
    </div>

    <!-- ЭКРАН РЕЗУЛЬТАТОВ -->
    <div id="result-screen" class="screen">
        <h1 style="text-align: left; margin-bottom: 5px;">Ваш результат:</h1>
        <div id="result-model-tag" class="result-model">Модель</div>
        <div id="result-content" class="result-text">
            <!-- Текст результата будет подставляться сюда -->
        </div>
        <button class="btn-main" style="margin-top: 25px;" onclick="location.reload()">Пройти заново</button>
    </div>
</div>

<script>
    // Массив с вопросами и логикой начисления баллов (A, B, C)
    const questions = [
        {
            title: "1. Сколько человек сейчас у вас в блоге?",
            options: [
                { text: "до 600 подписчиков, но зато почти всех знаю по именам.", score: "A" },
                { text: "до 3 500 подписчиков, уже есть активная база", score: "B" },
                { text: "больше 3 500 подписчиков и есть бюджет на привлечение новых.", score: "C" }
            ]
        },
        {
            title: "2. Какова ваша главная цель на ближайшие 1–2 месяца?",
            options: [
                { text: "Быстро сделать первые/крупные деньги на своей экспертности, без долгих прогревов.", score: "A" },
                { text: "Пробить финансовый потолок, собрать группу учеников и начать выстраивать систему.", score: "B" },
                { text: "Полностью автоматизировать продажи, чтобы освободить свое время и выйти из операционки.", score: "C" }
            ]
        },
        {
            title: "3. Что у вас сейчас с бюджетом на рекламу и командой?",
            options: [
                { text: "«Сам себе режиссер»: бюджета почти нет, команды тоже, всё делаю самостоятельно.", score: "A" },
                { text: "«Растущий проект»: есть небольшой бюджет, есть/будет в ближайшее время ассистент.", score: "B" },
                { text: "«Все по-взрослому»: есть стабильный рекламный бюджет и команда (технарь, дизайнер, закупщик).", score: "C" }
            ]
        },
        {
            title: "4. Каков средний чек вашего основного продукта?",
            options: [
                { text: "Высокий (от 50 000 до 200 000+ руб) ", score: "A" },
                { text: "Средний (от 15 000 до 50 000 руб) ", score: "B" },
                { text: "Доступный/Массовый (от 1 000 до 15 000 руб) ", score: "C" }
            ]
        },
        {
            title: "5. Как вы относитесь к личным созвонам, диагностикам и кастдевам?",
            options: [
                { text: "Отлично! Обожаю общаться с людьми тет-а-тет, слушать их запросы и продавать в диалоге.", score: "A" },
                { text: "Готов созваниваться, но только с самыми вовлеченными или в групповом формате на эфирах.", score: "B" },
                { text: "Хочу, чтобы люди сами покупали на сайте. Мое время стоит дорого, чтобы созваниваться.", score: "C" }
            ]
        }
    ];

    // База текстов финальных результатов
    const resultsData = {
        A: {
            title: "Индивидуальная модель 💎",
            desc: `<p><b>Ваш главный инсайт:</b> Вам вообще не нужны сложные автоворонки, сайты, отделы продаж и запуски. Попытка построить «завод» на маленьком блоге просто сожжет ваше время и энергию. Ваша суперсила сейчас - <b>личная вовлеченность и продажи на высокие чеки</b>.</p>
            </ul>`
        },
        B: {
            title: "Гибридная модель 🚀",
            desc: `<p><b>Ваш главный инсайт:</b> Вы находитесь в точке масштабирования. Продавать только через созвоны это путь к выгоранию, людей уже много. Но строить автоматический конвейер еще рано. Ваш выбор - <b>периодические живые запуски, набор в группы</b> или в комьюнити.</p>
            </ul>`
        },
        C: {
            title: "Конвейерная модель 🏭",
            desc: `<p><b>Ваш главный инсайт:</b> Хватит продавать вручную! Ваш бизнес требует построения бизнес-системы. Ваша задача - выйти из операционки и сделать так, чтобы продажи шли 24/7. Здесь фокус смещается на <b>холодный трафик, автоматизацию и команду</b>.</p>
            </ul>`
        }
    };

    let currentQuestionIndex = 0;
    let scores = { A: 0, B: 0, C: 0 };

    function startQuiz() {
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('question-screen').classList.add('active');
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentQuestionIndex];
        document.getElementById('question-title').innerText = q.title;
        
        // Обновление прогресс-бара
        const progressPercent = (currentQuestionIndex / questions.length) * 100;
        document.getElementById('progress').style.width = progressPercent + '%';

        const optionsContainer = document.getElementById('options');
        optionsContainer.innerHTML = '';

        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => selectOption(opt.score);
            optionsContainer.appendChild(btn);
        });
    }

    function selectOption(scoreLetter) {
        scores[scoreLetter]++;
        currentQuestionIndex++;

        if (currentQuestionIndex < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('question-screen').classList.remove('active');
        document.getElementById('result-screen').classList.add('active');

        // Определяем, каких букв больше всего
        let finalResult = 'A';
        if (scores.B >= scores.A && scores.B >= scores.C) {
            finalResult = 'B';
        } else if (scores.C >= scores.A && scores.C >= scores.B) {
            finalResult = 'C';
        }

        const resultData = resultsData[finalResult];
        document.getElementById('result-model-tag').innerText = resultData.title;
        document.getElementById('result-content').innerHTML = resultData.desc;
    }
</script>
</body>
</html>
